# Hierarchical eval on OGBench-Cube. Mirrors cube.yaml's env / dataset
# structure; overrides solver and adds policy_high.

defaults:
  - launcher: local
  - solver: hcem
  - _self_

world:
  env_name: ogbench/cube_single
  num_envs: ${eval.num_eval}
  max_episode_steps: ???
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - observation

seed: 42

policy: random
policy_high: ???

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: ogbench/cube_single_expert
  callables: null

output:
  filename: cube_hwm_results.txt
