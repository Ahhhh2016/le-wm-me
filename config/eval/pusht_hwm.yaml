# Hierarchical eval on Push-T. Sibling of pusht.yaml. Inherits its world /
# dataset / eval blocks; overrides the solver to the hierarchical one and
# adds a second checkpoint key (policy_high).
#
# Naming: macro latent dimension d_l (HWM Tab. 10) is NOT goal_offset_steps.
# d_l is read from the high checkpoint (model_high.d_l) unless you set solver.d_l.

defaults:
  - launcher: local
  - solver: hcem
  - _self_

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ???    # >= eval_budget (set by eval.py)
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42

# eval.py loads BOTH checkpoints via swm.policy.AutoCostModel and wires them
# into the HierarchicalCEMSolver as model_low / model_high.
policy: random              # set to a JEPA ckpt name to enable hierarchy
policy_high: ???            # required when policy != 'random'
# Optional roots for AutoCostModel (default: cache_dir for both). Use when low/high ckpts differ.
policy_cache_dir: null
policy_high_cache_dir: null

# true: model_high.pred_proj = model_low.pred_proj after load so low CEM and high
# subgoals share one pred space (required when train had share_pred_proj: false).
# false: keep both checkpoints’ pred_proj (reproduces the coordinate mismatch).
share_pred_proj_at_eval: true

plan_config:                # passed to WorldModelPolicy -> solver.configure as `config`
  horizon: 5                # low-level pred horizon (LeWM blocks)
  receding_horizon: 5       # k = 5 LeWM blocks (HWM Tab. 10 Push-T)
  action_block: 5           # frameskip

eval:
  num_eval: 50
  # Env-step gap start→goal (NOT macro latent dim d_l). Sweep {25,50,75} for long-horizon;
  # use 50 here if you want the same “50-step” goal distance as a baseline run.
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: pusht_hwm_results.txt
