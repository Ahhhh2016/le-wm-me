# @package _global_
# Leading "/" resolves from config root; nested under diagnose/ otherwise becomes diagnose/train/lewm
defaults:
  - /train/lewm
  - _self_

# Disable training-side logging for this entrypoint
wandb:
  enabled: false

# Path to saved JEPA (`*_object.ckpt` from ModelObjectCallBack, full torch.save)
ckpt_path: ???

num_pairs: 5000
batch_size: 32
state_key: state
seed: 42

# cuda | cpu | auto  (auto = cuda if available else cpu)
device: cuda
cuda_device: 0
# Match train.py trainer precision on GPU (faster inference)
use_bf16: true
