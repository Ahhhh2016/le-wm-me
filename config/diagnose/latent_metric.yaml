# @package _global_
# Leading "/" resolves from config root.
# Explicit @data: nested `data: pusht` inside /train/lewm may not merge at cfg.data under @package _global_.
# Order: /train/lewm before data/pusht so ${wm.*} interpolations in pusht.yaml resolve.
defaults:
  - /train/lewm
  - /train/data/pusht@data
  - _self_

# Disable training-side logging for this entrypoint
wandb:
  enabled: false

# Path to saved JEPA (`*_object.ckpt` from ModelObjectCallBack, full torch.save)
ckpt_path: ???

# Directory containing pusht_expert_train.h5 (same as eval.py cache_dir). Default: ~/.stable_worldmodel
cache_dir: null

num_pairs: 5000
batch_size: 32
state_key: state
seed: 42

# cuda | cpu | auto  (auto = cuda if available else cpu)
device: cuda
cuda_device: 0
# Match train.py trainer precision on GPU (faster inference)
use_bf16: true
